<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="app_title">Կալենդար</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ====== Մուտք / Գրանցում ====== -->
  <div id="auth" class="auth-wrap">
    <div class="auth-controls">
      <select id="lang-auth" class="lang-select" aria-label="language"></select>
      <button id="theme-toggle-auth" class="btn-ghost icon-btn" title="theme">🌙</button>
    </div>

    <div class="auth-quote" aria-hidden="true">
      <div id="q-text" class="q-text"></div>
      <div class="q-name" data-i18n="socrates_name">— Սոկրատես</div>
    </div>

    <div class="auth-form-area">
      <h1 data-i18n="app_title">Կալենդար</h1>
      <div class="tabs">
        <button id="tab-login" class="tab active" data-i18n="tab_login">Մուտք</button>
        <button id="tab-register" class="tab" data-i18n="tab_register">Գրանցում</button>
      </div>
      <form id="auth-form">
        <div id="fullname-row" class="hidden">
          <label data-i18n="full_name">Անուն Ազգանուն</label>
          <input id="full_name" type="text" data-i18n-ph="full_name" />
        </div>
        <label data-i18n="username">Օգտանուն</label>
        <input id="username" type="text" autocomplete="username" required />
        <label data-i18n="password">Գաղտնաբառ</label>
        <input id="password" type="password" autocomplete="current-password" minlength="8" required />
        <button type="submit" id="auth-submit" class="btn-primary" data-i18n="btn_login">Մուտք</button>
        <p id="auth-error" class="error"></p>
      </form>
    </div>

    <div class="mountains" aria-hidden="true">
      <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path class="mtn-back" d="M0,210 L210,110 L430,200 L660,80 L900,190 L1140,100 L1440,190 L1440,320 L0,320 Z"/>
        <path class="mtn-mid"  d="M0,250 L240,160 L470,240 L700,150 L940,245 L1180,165 L1440,240 L1440,320 L0,320 Z"/>
        <path class="mtn-front" d="M0,285 L200,225 L430,285 L640,215 L880,288 L1120,225 L1340,288 L1440,260 L1440,320 L0,320 Z"/>
      </svg>
    </div>
  </div>

  <!-- ====== Հիմնական էկրան ====== -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand">📅 <span data-i18n="app_title">Կալենդար</span></div>
      <nav class="nav">
        <button class="nav-tab active" data-view="calendar" data-i18n="nav_calendar">Կալենդար</button>
        <button class="nav-tab" data-view="rooms" data-i18n="nav_rooms">Իմ սենյակները</button>
        <button class="nav-tab" data-view="channels" data-i18n="nav_channels">Կանալներ</button>
      </nav>
      <div class="user-box">
        <select id="lang-app" class="lang-select" aria-label="language"></select>
        <button id="theme-toggle" class="btn-ghost icon-btn" title="theme">🌙</button>
        <span id="who"></span>
        <button id="logout" class="btn-ghost" data-i18n="logout">Ելք</button>
      </div>
    </header>

    <!-- ===== VIEW: Կալենդար ===== -->
    <main id="view-calendar" class="view">
      <section id="upcoming" class="card">
        <h2 data-i18n="upcoming">Առաջիկա դասեր</h2>
        <div id="upcoming-body"></div>
      </section>

      <section class="card">
        <div class="cal-head">
          <button id="prev" class="btn-ghost nav-btn">‹</button>
          <h2 id="cal-title"></h2>
          <button id="next" class="btn-ghost nav-btn">›</button>
          <button id="today-btn" class="btn-ghost" data-i18n="today">Այսօր</button>
        </div>
        <div class="legend">
          <span class="lg"><i class="dot s-scheduled"></i><span data-i18n="st_scheduled">Նշանակված</span></span>
          <span class="lg"><i class="dot s-done"></i><span data-i18n="st_done">Անցկացված</span></span>
          <span class="lg"><i class="dot s-cancelled"></i><span data-i18n="st_cancelled">Չեղարկված</span></span>
        </div>
        <div class="weekdays" id="weekdays"></div>
        <div id="calendar" class="calendar"></div>
      </section>
    </main>

    <!-- ===== VIEW: Իմ սենյակները ===== -->
    <main id="view-rooms" class="view hidden">
      <section class="card">
        <h2 data-i18n="create_room">Ստեղծել սենյակ</h2>
        <form id="room-form" class="room-form">
          <div class="grid2">
            <div>
              <label data-i18n="room_name">Սենյակի անուն</label>
              <input id="r-name" type="text" data-i18n-ph="room_name_ph" required />
            </div>
            <div>
              <label data-i18n="channel_name">Կանալի անուն</label>
              <input id="r-channel" type="text" data-i18n-ph="channel_name_ph" required />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" data-i18n="btn_create_room">Ստեղծել</button>
          </div>
          <p id="room-error" class="error"></p>
        </form>
        <h3 class="sub-h" data-i18n="my_rooms">Իմ սենյակները</h3>
        <div id="rooms-list"></div>
      </section>

      <!-- Ընտրված սենյակի ժամանակացույց -->
      <section id="room-schedule" class="card hidden">
        <h2><span data-i18n="room_schedule">Սենյակի ժամանակացույց</span>: <span id="active-room-name"></span></h2>
        <form id="lesson-form" class="lesson-form">
          <input type="hidden" id="lesson-id" />
          <div class="grid">
            <div>
              <label data-i18n="f_title">Անվանում</label>
              <input id="f-title" type="text" data-i18n-ph="f_title_ph" required />
            </div>
            <div>
              <label data-i18n="f_topic">Թեմա</label>
              <input id="f-topic" type="text" data-i18n-ph="f_topic" />
            </div>
            <div class="full datetime-block">
              <div class="dt-head">🗓 <span data-i18n="date_time">Օր և ժամ</span></div>
              <div class="dt-fields">
                <div class="dt-field">
                  <label>📅 <span data-i18n="day">Օր</span></label>
                  <input id="f-date" type="date" required />
                </div>
                <div class="dt-field">
                  <label>🕒 <span data-i18n="start">Սկիզբ</span></label>
                  <input id="f-start" type="time" required />
                </div>
                <div class="dt-field">
                  <label>🕓 <span data-i18n="end">Ավարտ</span></label>
                  <input id="f-end" type="time" />
                </div>
              </div>
            </div>
            <div id="repeat-block" class="full repeat-block">
              <div class="dt-field">
                <label data-i18n="repeat">Կրկնություն</label>
                <select id="f-repeat">
                  <option value="none" data-i18n="repeat_none">Առանց կրկնության</option>
                  <option value="weekly" data-i18n="repeat_weekly">Ամեն շաբաթ</option>
                </select>
              </div>
              <div id="repeat-count-field" class="dt-field hidden">
                <label data-i18n="repeat_count">Քանի անգամ</label>
                <input id="f-repeat-count" type="number" min="1" max="52" value="8" />
              </div>
            </div>
            <div class="full">
              <label data-i18n="note">Նշում</label>
              <input id="f-note" type="text" data-i18n-ph="note_ph" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="lesson-submit" data-i18n="btn_add">Ավելացնել դաս</button>
            <button type="button" class="btn-ghost hidden" id="lesson-cancel" data-i18n="btn_cancel">Չեղարկել</button>
          </div>
          <p id="lesson-error" class="error"></p>
        </form>
        <div id="lessons-table"></div>
      </section>
    </main>

    <!-- ===== VIEW: Կանալներ ===== -->
    <main id="view-channels" class="view hidden">
      <section class="card">
        <h2 data-i18n="channels_title">Բոլոր կանալները</h2>
        <div id="channels-list"></div>
      </section>
    </main>

  </div>

  <!-- Օրվա դասերի մոդալ -->
  <div id="day-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="day-modal-title"></h3>
        <button id="day-modal-close" class="btn-ghost icon-btn">✕</button>
      </div>
      <div id="day-modal-body"></div>
    </div>
  </div>

  <div id="toasts" class="toasts"></div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
